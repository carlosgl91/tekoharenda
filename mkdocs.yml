site_name: TEKOHARENDA - Catálogo Nacional de Datos Espaciales del Paraguay
site_description: Catálogo Nacional de Datos Espaciales del Paraguay
site_url: https://carlosgl91.github.io/tekoharenda 

theme:
  name: material
  palette:
    primary: teal
  logo: assets/logo_tekoharenda_png.png 
  features:
    #- navigation.tabs
    #- navigation.sections
    #- navigation.tabs.sticky
    #- navigation.footer
    - search.suggest
   # - toc.integrate         # Integra los subtítulos en el menú izquierdo
