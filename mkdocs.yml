      - 'Distancia a áreas urbanas, industriales y comerciales': datasets/ecology/dist_to_urban_industrial_and_comercial_areas.md
      - 'Distancia a formaciones forestales de más de 100 hectáreas': datasets/ecology/dist_to_forest_border_100_ha.md
