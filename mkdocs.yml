    - navigation.sections   # Hace que los bloques del menú se vean más como secciones ordenadas
extra_css:
  - stylesheets/extra.css
nav:
  - Inicio: index.md
  - Catálogo de Datos:
    - Clima:
      - 'Promedio anual de precipitación acumulada periodo 01-01-1994 a 01-01-2024': datasets/climate/annual_prec_1994_2024_chirps_pentad.md
      - 'Temperatura anual promedio en el periodo 1991-2019': datasets/climate/annual_temp_19912019_era5.md
