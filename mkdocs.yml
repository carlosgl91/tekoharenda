      - 'Áreas certificadas bajo el régimen de servicios ambientales': datasets/estatus_de_proteccion/areas_certificadas_csa.md
      - 'Áreas silvestres protegidas de Paraguay actualizado a agosto de 2022': datasets/estatus_de_proteccion/areas_silvestres_protegidas.md
      - 'Comunidades indígenas FAPI 2024': datasets/estatus_de_proteccion/comunidades_indgenas_fapi_2024.md
      - 'Comunidades indígenas INDI 2024': datasets/estatus_de_proteccion/comunidades_indgenas_indi_2024.md    
    - Topografía:
