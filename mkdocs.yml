      - 'Formaciones forestales más de 100 ha': datasets/ecology/formaciones_forestales_ms_de_100_ha.md
      - 'Áreas urbanas de Paraguay a partir de INE 2022': datasets/ecology/urban_areas_py_ine_2022.md
      - 'Areas urbananas de Paraguay a partir de INE 2022 Y OSM 2025': datasets/ecology/urban_areas_ine_&_osm_2022.md
      - 'Distancia al borde dentro de formaciones boscosas de al meno 1 ha': datasets/ecology/dist_to_border_within_forest_1ha.md
      - 'Distancia a ecosistemas acuáticos lóticos': datasets/ecology/dist_to_lotic_ecosystems.md
      - 'Distancia a la red vial': datasets/ecology/dist_to_road_network.md
