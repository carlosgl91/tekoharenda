      - 'El SRTM Digital Elevation Data Version 4 (SRTM v4)': datasets/topography/srtm_dem_version_v4.md
    
    - Uso y cobertura del suelo:
      - 'MapBiomas colección 5 1985-2023': datasets/landcover_landuse/mapbiomas_col_5_19852023.md
      
    - Suelos:    
      - 'Taxonomía del suelo en la Región Oriental': datasets/soils/soil_tax_east_reg_soil_taxonomy.md
      - 'Taxonomía del suelo en la Región Occidental': datasets/soils/soil_tax_west_reg_fao_class.md
    - Fuego:
      - 'MapBiomas Fuego colección 1 (Anual)': datasets/fire/mapbiomas_fire_col1_annual.md
      - 'MapBiomas Fuego colección 1 (Mensual)': datasets/fire/mapbiomas_fire_col1_monthly.md

  - Citación: citation.md

